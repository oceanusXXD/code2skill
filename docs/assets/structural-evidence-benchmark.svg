<text x="532.0" y="372" font-family="Arial, sans-serif" font-size="13" fill="#111827">Gold evidence recall</text>
<text x="64" y="156" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Path-only baseline</text>
