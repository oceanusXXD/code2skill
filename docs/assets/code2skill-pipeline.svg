<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">code2skill evidence compiler architecture</title>
  <desc id="desc">Layered architecture diagram showing repository inputs, the code2skill evidence compiler, generated Skill artifacts, target assistant files, and readiness validation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 13px Arial, sans-serif; fill: #475569; }
      .layer-label { font: 700 12px Arial, sans-serif; letter-spacing: 0.08em; fill: #475569; }
      .box-title { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 12px Arial, sans-serif; fill: #475569; }
      .caption { font: 12px Arial, sans-serif; fill: #64748b; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .input { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
      .core { fill: #f0f9ff; stroke: #0369a1; stroke-width: 1.2; }
      .artifact { fill: #ecfdf5; stroke: #047857; stroke-width: 1.2; }
      .target { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.2; }
      .note { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .flow { fill: none; stroke: #334155; stroke-width: 1.5; marker-end: url(#arrow); }
      .soft-flow { fill: none; stroke: #94a3b8; stroke-width: 1.2; marker-end: url(#arrow); }
      .divider { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1080" height="620" fill="#ffffff"/>
  <text x="46" y="48" class="title">Evidence Compiler Architecture</text>
  <text x="46" y="74" class="subtitle">code2skill turns repository structure into reviewable Skill files before publishing assistant-specific instructions.</text>

  <text x="62" y="128" class="layer-label">REPOSITORY INPUTS</text>
  <text x="390" y="128" class="layer-label">EVIDENCE COMPILER</text>
  <text x="780" y="128" class="layer-label">SKILL OUTPUTS</text>

  <rect x="46" y="146" width="238" height="330" rx="6" class="panel"/>
  <rect x="66" y="172" width="198" height="72" rx="6" class="input"/>
  <text x="86" y="200" class="box-title">Source files</text>
  <text x="86" y="222" class="box-text">Python modules, tests, docs</text>

  <rect x="66" y="268" width="198" height="72" rx="6" class="input"/>
  <text x="86" y="296" class="box-title">Config files</text>
  <text x="86" y="318" class="box-text">pyproject, CI, package data</text>

  <rect x="66" y="364" width="198" height="72" rx="6" class="input"/>
  <text x="86" y="392" class="box-title">Git context</text>
  <text x="86" y="414" class="box-text">diffs, state, ignored paths</text>

  <path d="M 284 208 H 340" class="flow"/>
  <path d="M 284 304 H 340" class="flow"/>
  <path d="M 284 400 H 340" class="flow"/>

  <rect x="340" y="146" width="390" height="330" rx="6" class="panel"/>
  <rect x="366" y="172" width="154" height="82" rx="6" class="core"/>
  <text x="386" y="202" class="box-title">AST extraction</text>
  <text x="386" y="224" class="box-text">routes, calls, types</text>
  <text x="386" y="242" class="box-text">data-flow, exceptions</text>

  <rect x="550" y="172" width="154" height="82" rx="6" class="core"/>
  <text x="570" y="202" class="box-title">Import graph</text>
  <text x="570" y="224" class="box-text">modules, aliases</text>
  <text x="570" y="242" class="box-text">re-exported symbols</text>

  <rect x="366" y="286" width="154" height="82" rx="6" class="core"/>
  <text x="386" y="316" class="box-title">Prioritization</text>
  <text x="386" y="338" class="box-text">PageRank, roles</text>
  <text x="386" y="356" class="box-text">evidence coverage</text>

  <rect x="550" y="286" width="154" height="82" rx="6" class="core"/>
  <text x="570" y="316" class="box-title">Skill planning</text>
  <text x="570" y="338" class="box-text">blueprint, workflows</text>
  <text x="570" y="356" class="box-text">source-cited context</text>

  <path d="M 520 213 H 550" class="soft-flow"/>
  <path d="M 443 254 V 286" class="soft-flow"/>
  <path d="M 627 254 V 286" class="soft-flow"/>
  <path d="M 520 327 H 550" class="soft-flow"/>

  <rect x="386" y="402" width="318" height="48" rx="6" class="note"/>
  <text x="410" y="431" class="caption">LLM calls happen after the structural evidence layer is built.</text>

  <path d="M 730 213 H 778" class="flow"/>
  <path d="M 730 327 H 778" class="flow"/>

  <rect x="778" y="146" width="256" height="330" rx="6" class="panel"/>
  <rect x="802" y="172" width="210" height="72" rx="6" class="artifact"/>
  <text x="822" y="200" class="box-title">.code2skill bundle</text>
  <text x="822" y="222" class="box-text">summary, blueprint, report, state</text>

  <rect x="802" y="268" width="210" height="72" rx="6" class="artifact"/>
  <text x="822" y="296" class="box-title">Generated Skills</text>
  <text x="822" y="318" class="box-text">source-cited Markdown rules</text>

  <rect x="802" y="364" width="210" height="72" rx="6" class="target"/>
  <text x="822" y="392" class="box-title">Assistant targets</text>
  <text x="822" y="414" class="box-text">Codex, Cursor, Claude, Copilot</text>

  <path d="M 907 244 V 268" class="soft-flow"/>
  <path d="M 907 340 V 364" class="soft-flow"/>

  <line x1="46" y1="514" x2="1034" y2="514" class="divider"/>
  <rect x="46" y="536" width="238" height="44" rx="6" class="note"/>
  <text x="66" y="563" class="caption">No hidden chat context: artifacts live in the repository.</text>
  <rect x="340" y="536" width="390" height="44" rx="6" class="note"/>
  <text x="366" y="563" class="caption">Incremental CI uses reverse dependencies and analysis state.</text>
  <rect x="778" y="536" width="256" height="44" rx="6" class="note"/>
  <text x="802" y="563" class="caption">doctor validates bundle and target readiness.</text>
</svg>
