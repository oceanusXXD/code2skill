[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "code2skill"
version = "0.3.0"
description = "Turn a code repository into structured AI skill context."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
  { name = "OceanusXXD" },
]
dependencies = [
  "tomli>=2.0.1; python_version < '3.11'",
]
keywords = ["ai", "cli", "developer-tools", "skills"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Build Tools",
  "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://github.com/oceanusXXD/code2skill"
Repository = "https://github.com/oceanusXXD/code2skill"
Issues = "https://github.com/oceanusXXD/code2skill/issues"

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[project.scripts]
code2skill = "code2skill.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = false

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
